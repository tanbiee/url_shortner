services:
  app:
    build: .
    image: url-shortener:local
    ports:
      - "8081:8081"
    environment:
      - MONGO_HOST=mongodb
      - REDIS_HOST=redis
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongodb_data:
